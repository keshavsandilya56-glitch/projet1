<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A stylish Hello World page" />
  <title>my name is Keshav!</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f7ff;
      --muted: #bcbad5;
      --violet: #8a5cff;
      --cyan: #43d9ff;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #0d0b1d;
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .orb {
      position: absolute;
      width: 32rem;
      aspect-ratio: 1;
      border-radius: 50%;
      filter: blur(2px);
      opacity: .55;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .orb.one { background: #6d3cff; top: -15rem; left: -9rem; }
    .orb.two { background: #00b8e6; bottom: -18rem; right: -9rem; animation-delay: -5s; }

    main {
      position: relative;
      width: min(90%, 760px);
      padding: clamp(2rem, 7vw, 5rem);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 28px;
      background: rgba(22, 19, 48, .64);
      box-shadow: 0 25px 80px rgba(0, 0, 0, .35);
      backdrop-filter: blur(18px);
      animation: appear .9s cubic-bezier(.2, .8, .2, 1) both;
    }

    .eyebrow {
      margin: 0 0 1rem;
      color: var(--cyan);
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .19em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 10vw, 6.5rem);
      line-height: .98;
      letter-spacing: -.065em;
      background: linear-gradient(120deg, #fff 15%, #c5b5ff 52%, #6ee6ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      max-width: 35rem;
      margin: 1.5rem auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.18rem);
      line-height: 1.7;
    }

    .sparkle {
      display: inline-block;
      margin-left: .18em;
      color: #ffdf7e;
      animation: twinkle 1.8s ease-in-out infinite;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(24px) scale(.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes drift {
      to { transform: translate(7rem, 4rem) scale(1.18); }
    }

    @keyframes twinkle {
      50% { transform: rotate(18deg) scale(1.25); filter: drop-shadow(0 0 10px #ffdf7e); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>
<body>
  <div class="orb one" aria-hidden="true"></div>
  <div class="orb two" aria-hidden="true"></div>

  <main>
    <p class="eyebrow">A fresh beginning</p>
    <h1>Hello, World<span class="sparkle">✦</span></h1>
    <p>Something wonderful starts with a single line of code. Welcome to your new page.</p>
  </main>
</body>
</html>
